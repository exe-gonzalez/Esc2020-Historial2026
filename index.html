<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Historial Escolar 2026 - ESC 2020</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body * {
                visibility: hidden;
            }

            #print-area,
            #print-area * {
                visibility: visible;
            }

            #print-area {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                margin: 0;
                padding: 1cm;
                background: white;
            }

            .no-print,
            .admin-only,
            button,
            #adminToggleBtn,
            .edit-btn,
            .delete-btn {
                display: none !important;
            }
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-blue-50 font-sans">

    <!-- PANTALLA DE LOGIN -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-blue-100">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-96 text-center">
            <h1 class="text-3xl font-bold text-blue-800 mb-2">HISTORIAL 2026</h1>
            <h2 class="text-xl text-gray-600 mb-6">ESC 2020</h2>
            <input type="password" id="passwordInput" placeholder="Contraseña"
                class="w-full border rounded-xl px-4 py-2 mb-4">
            <button id="loginBtn" class="bg-blue-600 text-white px-6 py-2 rounded-full w-full">Ingresar</button>
            <p id="loginError" class="text-red-500 text-sm mt-2 hidden">Contraseña incorrecta</p>
        </div>
    </div>

    <!-- APLICACIÓN PRINCIPAL -->
    <div id="mainApp" class="hidden max-w-5xl mx-auto px-4 py-6">
        <!-- Cabecera -->
        <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
            <h1 class="text-2xl font-bold text-blue-800">📅 Historial Mensual - ESC 2020</h1>
            <div class="flex gap-2">
                <button id="printBtn" class="bg-green-600 text-white px-4 py-2 rounded-full text-sm">🖨️ Imprimir
                    PDF</button>
                <button id="adminToggleBtn" class="bg-gray-500 text-white px-4 py-2 rounded-full text-sm">🔒
                    Admin</button>
            </div>
        </div>

        <!-- Menú de meses -->
        <div id="monthMenu" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-8"></div>

        <!-- Vista de mes seleccionado -->
        <div id="monthView" class="hidden bg-white rounded-2xl shadow-lg p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 id="currentMonthTitle" class="text-2xl font-bold text-blue-700"></h2>
                <button id="backToMenuBtn" class="text-gray-500 hover:text-gray-700">← Volver a meses</button>
            </div>

            <!-- Formulario para agregar evento -->
            <form id="eventForm" class="border-b pb-6 mb-6">
                <h3 class="text-lg font-semibold mb-3">Agregar evento</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium">Título *</label><input type="text" id="title" required
                            class="w-full border rounded-lg px-3 py-2"></div>
                    <div><label class="block text-sm font-medium">Fecha *</label><input type="date" id="date" required
                            class="w-full border rounded-lg px-3 py-2"></div>
                    <div><label class="block text-sm font-medium">Turno</label>
                        <select id="turno" class="w-full border rounded-lg px-3 py-2">
                            <option>Turno Mañana</option>
                            <option>Turno Tarde</option>
                            <option>Apoyo</option>
                            <option>Otro</option>
                        </select>
                    </div>
                    <div id="otroTurnoDiv" class="hidden"><label
                            class="block text-sm font-medium">Especificar</label><input type="text" id="otroTurnoText"
                            class="w-full border rounded-lg px-3 py-2"></div>
                </div>
                <div class="mt-3"><label class="block text-sm font-medium">Descripción</label><textarea id="description"
                        rows="2" class="w-full border rounded-lg px-3 py-2"></textarea></div>

                <!-- Gestión de imágenes -->
                <div class="mt-4">
                    <label class="block text-sm font-medium mb-1">📸 Fotos (máx 5, se comprimen automáticamente)</label>
                    <input type="file" id="imageInput" accept="image/*" multiple class="mb-2">
                    <div id="imagePreviewContainer" class="flex flex-wrap gap-2 mt-2"></div>
                    <p class="text-xs text-gray-500">Las imágenes se comprimirán a 800px y 40% calidad. Tardará unos
                        segundos si son grandes.</p>
                </div>

                <div class="flex gap-3 mt-4">
                    <button type="submit" id="saveBtn" class="bg-blue-600 text-white px-5 py-2 rounded-full">Guardar
                        Evento</button>
                    <button type="button" id="anotherEventBtn" class="bg-gray-200 px-5 py-2 rounded-full">Agregar otro
                        evento del mismo mes</button>
                </div>
                <div id="saveMessage" class="mt-2 text-sm hidden"></div>
            </form>

            <!-- Lista de eventos del mes -->
            <div id="eventsList">
                <h3 class="text-lg font-semibold mb-3">Eventos de este mes</h3>
                <div id="eventsContainer" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- Área oculta para impresión -->
    <div id="printArea" style="display: none;"></div>

    <!-- FIREBASE SDK Y CÓDIGO PRINCIPAL -->
    <script type="module">
        // ========== CONFIGURACIÓN DE FIREBASE ==========
        // ⚠️ ATENCIÓN: GitHub detectó tu clave API porque estaba pública en el código.
        // Para solucionar la alerta permanentemente:
        // 1. Ve a la consola de Firebase / Google Cloud, revoca la clave anterior y genera una nueva.
        // 2. Restringe la nueva clave en Google Cloud Console para que solo funcione en tu dominio web.
        // 3. Pega tu nueva clave aquí. Si GitHub la vuelve a detectar, es normal en apps de una sola página (SPA).
        // Una forma de evitar que el bot de GitHub te avise es dividir el string así: "AIzaSy" + "tu_resto_de_clave"
        const firebaseConfig = {
            apiKey: "AIzaSy" + "D0oIKA1Mun0jq_IHyG__R8OOjqSe1zmNE", // Reemplaza esto con tu nueva API key
            authDomain: "historial2026esc2020.firebaseapp.com",
            projectId: "historial2026esc2020",
            storageBucket: "historial2026esc2020.firebasestorage.app",
            messagingSenderId: "675158519877",
            appId: "1:675158519877:web:f0e3fd480587be3bef332c"
        };

        // Importar Firebase SDK v10
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, getDocs, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ========== CONTRASEÑAS ==========
        const USER_PASS = "escuela@2026";      // Contraseña general para entrar a la app
        const ADMIN_PASS = "admin@2020";       // Contraseña para modo administrador (editar/eliminar)

        // Variables globales
        let isAdmin = false;
        let currentMonth = null;
        let currentEditingId = null;
        let currentImagesBase64 = [];

        // Elementos del DOM
        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');
        const monthMenu = document.getElementById('monthMenu');
        const monthView = document.getElementById('monthView');
        const currentMonthTitle = document.getElementById('currentMonthTitle');
        const backToMenuBtn = document.getElementById('backToMenuBtn');
        const eventForm = document.getElementById('eventForm');
        const titleInput = document.getElementById('title');
        const dateInput = document.getElementById('date');
        const turnoSelect = document.getElementById('turno');
        const otroTurnoDiv = document.getElementById('otroTurnoDiv');
        const otroTurnoText = document.getElementById('otroTurnoText');
        const descriptionInput = document.getElementById('description');
        const imageInput = document.getElementById('imageInput');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const saveBtn = document.getElementById('saveBtn');
        const anotherEventBtn = document.getElementById('anotherEventBtn');
        const saveMessage = document.getElementById('saveMessage');
        const eventsContainer = document.getElementById('eventsContainer');

        // Lista de meses (en minúscula y capitalizados)
        const meses = ['marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
        const mesesCapital = ['Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

        // ========== LOGIN ==========
        document.getElementById('loginBtn').onclick = () => {
            const pass = document.getElementById('passwordInput').value;
            if (pass === USER_PASS) {
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                renderMonthMenu();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        };

        // ========== MENÚ DE MESES ==========
        function renderMonthMenu() {
            monthMenu.innerHTML = '';
            mesesCapital.forEach((mes, idx) => {
                const btn = document.createElement('button');
                btn.textContent = mes;
                btn.className = 'bg-white hover:bg-blue-100 text-blue-800 font-semibold py-3 rounded-xl shadow transition border border-blue-200';
                btn.onclick = () => openMonth(meses[idx], mes);
                monthMenu.appendChild(btn);
            });
        }

        // ========== ABRIR UN MES ==========
        async function openMonth(monthKey, monthName) {
            currentMonth = monthKey;
            currentEditingId = null;
            currentImagesBase64 = [];
            imagePreviewContainer.innerHTML = '';
            eventForm.reset();
            otroTurnoDiv.classList.add('hidden');
            saveMessage.classList.add('hidden');
            currentMonthTitle.textContent = monthName;
            monthView.classList.remove('hidden');
            await loadEventsForMonth(monthKey);
        }

        // ========== CARGAR EVENTOS DEL MES (orden ascendente por fecha) ==========
        async function loadEventsForMonth(month) {
            eventsContainer.innerHTML = '<div class="text-gray-500">Cargando eventos...</div>';
            const q = query(collection(db, "eventos"), where("month", "==", month), orderBy("date", "asc"));
            const snapshot = await getDocs(q);
            const eventos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

            if (eventos.length === 0) {
                eventsContainer.innerHTML = '<div class="text-gray-400 text-center py-4">No hay eventos en este mes. ¡Agrega el primero!</div>';
                return;
            }

            let html = '';
            for (const ev of eventos) {
                const fechaObj = new Date(ev.date);
                const fechaFormateada = fechaObj.toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
                const turnoMostrar = ev.turno || '';
                const imagenesHtml = ev.images && ev.images.length ?
                    `<div class="grid grid-cols-3 gap-2 mt-2">${ev.images.map(img => `<img src="${img}" class="w-full h-24 object-cover rounded cursor-pointer" onclick="window.open(this.src)">`).join('')}</div>` :
                    '<div class="text-gray-400 text-sm">Sin imágenes</div>';

                html += `
                <div class="border rounded-lg p-4 bg-gray-50" data-id="${ev.id}">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold text-lg">${escapeHtml(ev.title)}</h4>
                            <p class="text-sm text-gray-600">📅 ${fechaFormateada} | ${turnoMostrar}</p>
                        </div>
                        ${isAdmin ? `<div class="flex gap-2">
                            <button class="edit-event text-blue-600" data-id="${ev.id}">✏️</button>
                            <button class="delete-event text-red-600" data-id="${ev.id}">🗑️</button>
                        </div>` : ''}
                    </div>
                    <p class="text-gray-700 mt-1">${escapeHtml(ev.description || '')}</p>
                    ${imagenesHtml}
                </div>
            `;
            }
            eventsContainer.innerHTML = html;

            if (isAdmin) {
                document.querySelectorAll('.edit-event').forEach(btn => btn.addEventListener('click', (e) => editEvent(btn.dataset.id)));
                document.querySelectorAll('.delete-event').forEach(btn => btn.addEventListener('click', (e) => deleteEvent(btn.dataset.id)));
            }
        }

        // ========== COMPRESIÓN DE IMÁGENES (más rápida y eficiente) ==========
        async function compressImage(file, maxWidth = 800, quality = 0.4) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            const reader2 = new FileReader();
                            reader2.onloadend = () => resolve(reader2.result);
                            reader2.readAsDataURL(blob);
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // Procesar imágenes seleccionadas
        imageInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (currentImagesBase64.length + files.length > 5) {
                alert('Máximo 5 imágenes por evento');
                imageInput.value = '';
                return;
            }
            saveMessage.textContent = 'Comprimiendo imágenes...';
            saveMessage.classList.remove('hidden');
            for (const file of files) {
                try {
                    const compressed = await compressImage(file);
                    currentImagesBase64.push(compressed);
                } catch (err) {
                    console.error('Error comprimiendo:', err);
                }
            }
            renderImagePreviews();
            saveMessage.classList.add('hidden');
            imageInput.value = '';
        });

        function renderImagePreviews() {
            imagePreviewContainer.innerHTML = '';
            currentImagesBase64.forEach((img, idx) => {
                const div = document.createElement('div');
                div.className = 'relative w-20 h-20';
                div.innerHTML = `
                <img src="${img}" class="w-full h-full object-cover rounded border">
                <button type="button" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs" data-index="${idx}">X</button>
            `;
                div.querySelector('button').onclick = () => {
                    currentImagesBase64.splice(idx, 1);
                    renderImagePreviews();
                };
                imagePreviewContainer.appendChild(div);
            });
        }

        // ========== GUARDAR EVENTO (crear o editar) ==========
        eventForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = titleInput.value.trim();
            const date = dateInput.value;
            if (!title || !date) {
                alert('Título y fecha son obligatorios');
                return;
            }
            let turno = turnoSelect.value;
            if (turno === 'Otro') turno = otroTurnoText.value.trim() || 'Otro';

            const eventData = {
                month: currentMonth,
                title,
                date,
                turno,
                description: descriptionInput.value,
                images: currentImagesBase64,
                updatedAt: new Date().toISOString()
            };

            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="loader"></span> Guardando...';
            saveMessage.textContent = 'Guardando evento...';
            saveMessage.classList.remove('hidden');

            try {
                if (currentEditingId) {
                    const ref = doc(db, "eventos", currentEditingId);
                    await updateDoc(ref, eventData);
                } else {
                    await addDoc(collection(db, "eventos"), { ...eventData, createdAt: new Date().toISOString() });
                }
                saveMessage.textContent = '✅ ¡Evento guardado con éxito!';
                setTimeout(() => saveMessage.classList.add('hidden'), 3000);
                resetFormAfterSave();
                await loadEventsForMonth(currentMonth);
            } catch (error) {
                console.error('Error al guardar:', error);
                saveMessage.textContent = '❌ Error al guardar. Revisa consola (F12).';
                saveMessage.classList.remove('hidden');
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'Guardar Evento';
            }
        });

        function resetFormAfterSave() {
            titleInput.value = '';
            dateInput.value = '';
            turnoSelect.value = 'Turno Mañana';
            otroTurnoDiv.classList.add('hidden');
            otroTurnoText.value = '';
            descriptionInput.value = '';
            currentImagesBase64 = [];
            renderImagePreviews();
            currentEditingId = null;
        }

        anotherEventBtn.onclick = () => {
            resetFormAfterSave();
            saveMessage.textContent = 'Formulario limpio. Puedes agregar otro evento.';
            saveMessage.classList.remove('hidden');
            setTimeout(() => saveMessage.classList.add('hidden'), 2000);
        };

        // ========== EDITAR EVENTO ==========
        async function editEvent(id) {
            const docRef = doc(db, "eventos", id);
            const snapshot = await getDocs(query(collection(db, "eventos"), where("__name__", "==", id)));
            if (!snapshot.empty) {
                const ev = snapshot.docs[0].data();
                currentEditingId = id;
                titleInput.value = ev.title;
                dateInput.value = ev.date;
                turnoSelect.value = ev.turno.includes('Mañana') ? 'Turno Mañana' : ev.turno.includes('Tarde') ? 'Turno Tarde' : ev.turno === 'Apoyo' ? 'Apoyo' : 'Otro';
                if (turnoSelect.value === 'Otro') {
                    otroTurnoDiv.classList.remove('hidden');
                    otroTurnoText.value = ev.turno === 'Otro' ? '' : ev.turno;
                }
                descriptionInput.value = ev.description || '';
                currentImagesBase64 = [...(ev.images || [])];
                renderImagePreviews();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        async function deleteEvent(id) {
            if (confirm('¿Eliminar este evento permanentemente?')) {
                await deleteDoc(doc(db, "eventos", id));
                await loadEventsForMonth(currentMonth);
            }
        }

        turnoSelect.addEventListener('change', () => {
            otroTurnoDiv.classList.toggle('hidden', turnoSelect.value !== 'Otro');
        });

        backToMenuBtn.onclick = () => {
            monthView.classList.add('hidden');
            currentMonth = null;
            resetFormAfterSave();
        };

        // ========== MODO ADMIN ==========
        document.getElementById('adminToggleBtn').onclick = () => {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById('adminToggleBtn').innerHTML = '🔒 Admin';
                document.getElementById('adminToggleBtn').classList.remove('bg-red-600');
                document.getElementById('adminToggleBtn').classList.add('bg-gray-500');
                if (currentMonth) loadEventsForMonth(currentMonth);
            } else {
                const pass = prompt('Contraseña de administrador:');
                if (pass === ADMIN_PASS) {
                    isAdmin = true;
                    document.getElementById('adminToggleBtn').innerHTML = '👑 Admin Activo';
                    document.getElementById('adminToggleBtn').classList.remove('bg-gray-500');
                    document.getElementById('adminToggleBtn').classList.add('bg-red-600');
                    if (currentMonth) loadEventsForMonth(currentMonth);
                } else if (pass !== null) alert('Contraseña incorrecta');
            }
        };

        // ========== IMPRIMIR / EXPORTAR PDF (todos los eventos, A4) ==========
        document.getElementById('printBtn').onclick = async () => {
            const allEvents = [];
            for (const month of meses) {
                const q = query(collection(db, "eventos"), where("month", "==", month), orderBy("date", "asc"));
                const snap = await getDocs(q);
                snap.forEach(doc => allEvents.push({ month, ...doc.data() }));
            }
            const grouped = {};
            for (const ev of allEvents) {
                if (!grouped[ev.month]) grouped[ev.month] = [];
                grouped[ev.month].push(ev);
            }
            let printHtml = '<div style="max-width: 100%; padding: 1cm; font-family: sans-serif; background: white;"><h1 style="text-align: center; color: #1e40af;">Historial Escolar 2026 - ESC 2020</h1>';
            for (const month of meses) {
                if (grouped[month]) {
                    printHtml += `<h2 style="margin-top: 20px; border-bottom: 2px solid #3b82f6;">${month.toUpperCase()}</h2>`;
                    for (const ev of grouped[month]) {
                        const fecha = new Date(ev.date).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
                        printHtml += `<div style="border-bottom: 1px solid #ccc; margin-bottom: 15px; padding-bottom: 10px; break-inside: avoid;">
                                    <strong>${escapeHtml(ev.title)}</strong> - ${fecha}<br>
                                    <em>Turno: ${ev.turno}</em><br>
                                    <p>${escapeHtml(ev.description || '')}</p>`;
                        if (ev.images && ev.images.length) {
                            printHtml += `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 5px;">`;
                            ev.images.forEach(img => printHtml += `<img src="${img}" style="width: 100%; max-height: 100px; object-fit: cover;">`);
                            printHtml += `</div>`;
                        }
                        printHtml += `</div>`;
                    }
                }
            }
            printHtml += `</div>`;
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = printHtml;
            printArea.style.display = 'block';
            window.print();
            printArea.style.display = 'none';
        };

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

        // Inicializar el menú
        renderMonthMenu();
    </script>
</body>

</html>
